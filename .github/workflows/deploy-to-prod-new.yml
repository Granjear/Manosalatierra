name: Modern Build and Deploy to Production

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Required permissions for the 'actions/deploy-pages' logic
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout Staging Code
        uses: actions/checkout@v6

      - name: Generate Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.Granjear }}
          repositories: "github.io"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Build Jekyll Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      # STEP 1: Package the _site folder as a Pages artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      # STEP 2: Deploy to the Production Repository
      - name: Deploy to Production
        uses: actions/deploy-pages@v4
        with:
          # Use the GitHub App token to allow cross-repo deployment
          token: ${{ steps.generate-token.outputs.token }}
          # Specify the production repository
          repository: ${{ github.Granjear }}/github.io
